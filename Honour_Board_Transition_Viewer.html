<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Excel Transition Viewer</title>
    <style>
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        body {
            margin: 0;
            padding: 0;
            background: #111111;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        /* Hide taskbar and system elements */
        body::-webkit-scrollbar { display: none; }
        .frame {
            width: 100%;
            height: 100vh;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #662537 0%, #151A90 100%);
            border: none;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .title-bar {
            background: #ffffff;
            color: #151A90;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 1.0vh 1.0vw;
            position: relative;
            z-index: 100;
            height: auto;
        }
        .title {
            font-size: 4.5vh;
            font-weight: 900;
            letter-spacing: 0.1vw;
            text-align: left;
            padding-left: 1.0vw;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-transform: uppercase;
        }
        .logo-slot {
            width: 12.0vw;
            height: 4.0vh;
            position: absolute;
            right: 1.0vw;
            top: 50%;
            transform: translateY(-50%);
        }
        .logo-slot img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        #content {
            flex: 1;
            position: relative;
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #message { text-align: center; }
        #tableContainer {
            height: calc(100vh - 2.78vh);
            overflow-y: hidden;
            overflow-x: hidden;
            scrollbar-width: none;
            -ms-overflow-style: none;
            background: inherit;
            padding: 0;
            margin: 0;
            position: relative;
            --safe-bottom: 0.93vh;
            --grid-bottom: 0.32vh;
            transition: opacity 0.5s ease-in-out;
        }
        #tableContainer::-webkit-scrollbar { width: 0; height: 0; }
        #tableContainer > * { width: 100% !important; margin: 0 !important; padding: 0 !important; background: transparent !important; }
        #tableContainer * { background-color: transparent !important; }
        .sticky-underline {
            position: sticky;
            top: 0;
            height: 0;
            border-bottom: 0.09vh solid rgba(255,255,255,0.85);
            z-index: 20;
            pointer-events: none;
        }
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            transform: translateY(var(--scroll-y, 0vh));
            z-index: 5;
            pointer-events: none;
            display: block !important;
            background: transparent !important;
        }
        /* Viewer 1 Layout: 15%, 28.33%, 28.33%, 28.33% */
        .layout-viewer1 .grid-overlay::before {
            content: '';
            position: absolute;
            left: 0; right: 0; top: calc(var(--header-h, 0) - 10px); height: calc(100% - var(--header-h, 0) + 10px);
            background-image:
                linear-gradient(to right,
                    transparent calc(15% - 1px),
                    rgba(255,255,255,0.85) calc(15% - 1px),
                    rgba(255,255,255,0.85) calc(15% + 1px),
                    transparent calc(15% + 1px)
                ),
                linear-gradient(to right,
                    transparent calc(43.33% - 1px),
                    rgba(255,255,255,0.85) calc(43.33% - 1px),
                    rgba(255,255,255,0.85) calc(43.33% + 1px),
                    transparent calc(43.33% + 1px)
                ),
                linear-gradient(to right,
                    transparent calc(71.66% - 1px),
                    rgba(255,255,255,0.85) calc(71.66% - 1px),
                    rgba(255,255,255,0.85) calc(71.66% + 1px),
                    transparent calc(71.66% + 1px)
                );
        }
        /* Viewer 2 Layout: 20%, 20%, 20%, 20%, 20% */
        .layout-viewer2 .grid-overlay::before {
            content: '';
            position: absolute;
            left: 0; right: 0; top: calc(var(--header-h, 0) - 10px); height: calc(100% - var(--header-h, 0) + 10px);
            background-image:
                linear-gradient(to right,
                    transparent calc(20% - 1px),
                    rgba(255,255,255,0.85) calc(20% - 1px),
                    rgba(255,255,255,0.85) calc(20% + 1px),
                    transparent calc(20% + 1px)
                ),
                linear-gradient(to right,
                    transparent calc(40% - 1px),
                    rgba(255,255,255,0.85) calc(40% - 1px),
                    rgba(255,255,255,0.85) calc(40% + 1px),
                    transparent calc(40% + 1px)
                ),
                linear-gradient(to right,
                    transparent calc(60% - 1px),
                    rgba(255,255,255,0.85) calc(60% - 1px),
                    rgba(255,255,255,0.85) calc(60% + 1px),
                    transparent calc(60% + 1px)
                ),
                linear-gradient(to right,
                    transparent calc(80% - 1px),
                    rgba(255,255,255,0.85) calc(80% - 1px),
                    rgba(255,255,255,0.85) calc(80% + 1px),
                    transparent calc(80% + 1px)
                );
        }
        /* Viewer 3 Layout: 33.3%, 33.3%, 33.3% */
        .layout-viewer3 .grid-overlay::before {
            content: '';
            position: absolute;
            left: 0; right: 0; top: calc(var(--header-h, 0) - 10px); height: calc(100% - var(--header-h, 0) + 10px);
            background-image:
                linear-gradient(to right,
                    transparent calc(33.3% - 1px),
                    rgba(255,255,255,0.85) calc(33.3% - 1px),
                    rgba(255,255,255,0.85) calc(33.3% + 1px),
                    transparent calc(33.3% + 1px)
                ),
                linear-gradient(to right,
                    transparent calc(66.6% - 1px),
                    rgba(255,255,255,0.85) calc(66.6% - 1px),
                    rgba(255,255,255,0.85) calc(66.6% + 1px),
                    transparent calc(66.6% + 1px)
                );
        }
        table {
            width: 100%;
            border-collapse: collapse;
            border: none !important;
            table-layout: fixed;
            color: #ffffff;
            text-transform: uppercase;
            background: transparent;
            margin: 0;
        }
        #excel-table { width: 100% !important; max-width: 100%; }
        th, td {
            padding: 0.46vh 0.65vw;
            text-align: center !important;
            word-break: break-word;
            border-left: none;
            font-size: 3.5vh;
            font-weight: 600;
            letter-spacing: 0.1vw;
        }
        #excel-table tr,
        #excel-table th,
        #excel-table td { height: auto !important; }
        #excel-table tr[style*="height"],
        #excel-table th[style*="height"],
        #excel-table td[style*="height"] { height: auto !important; }
        #excel-table tbody tr { 
            height: 1.48vh !important; 
            border: none !important;
            border-top: none !important;
            border-bottom: none !important;
            border-left: none !important;
            border-right: none !important;
        }
        #excel-table tbody td {
            padding: 0.28vh 0.46vw;
            vertical-align: middle;
            line-height: 1.0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-height: none;
            border: none !important;
            border-top: none !important;
            border-bottom: none !important;
            border-left: none !important;
            border-right: none !important;
        }
        tr td:last-child, tr th:last-child { border-right: none; }
        tr td, tr th { border-bottom: none !important; border-top: none !important; }
        #excel-table th:first-child,
        #excel-table td:first-child { border-left: none; }
        #excel-table th:last-child,
        #excel-table td:last-child { border-right: none; border-left: none; }
        #excel-table thead { position: sticky; top: 0; z-index: 15; background: #3B2155; }
        #excel-table thead::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            border-bottom: 0.09vh solid rgba(255,255,255,0.85);
            pointer-events: none;
        }
        #excel-table:not(.has-thead) tr:first-child th, 
        #excel-table:not(.has-thead) tr:first-child td {
            position: sticky;
            top: 0;
            background: transparent;
            color: #ffffff;
            font-weight: 700;
            z-index: 10;
            border-top: none !important;
            border-bottom: 0;
            border-left: none !important;
            font-size: 4.0vh !important;
            padding: 0.09vh 0.28vw !important;
            line-height: 1.0 !important;
            height: auto !important;
        }
        #excel-table tr:first-child th,
        #excel-table tr:first-child td {
            font-size: 3.5vh !important;
            font-weight: 600 !important;
            padding: 0.46vh 0.65vw !important;
            text-align: center !important;
            text-transform: uppercase !important;
            word-break: break-word !important;
            border-left: none !important;
            height: auto !important;
            white-space: nowrap !important;
            overflow: visible !important;
            text-overflow: clip !important;
        }
        #excel-table tbody tr:first-child th,
        #excel-table tbody tr:first-child td {
            font-size: 3.5vh !important;
            font-weight: 600 !important;
            padding: 0.46vh 0.65vw !important;
            text-align: center !important;
            text-transform: uppercase !important;
            word-break: break-word !important;
            border-left: none !important;
            height: auto !important;
            white-space: nowrap !important;
            overflow: visible !important;
            text-overflow: clip !important;
        }
        #excel-table tr:first-child th::after,
        #excel-table tr:first-child td::after {
            display: none !important;
            content: none !important;
            border: none !important;
        }
        #excel-table.has-thead tr:first-child th::after,
        #excel-table thead th { 
            font-size: 4.2vh !important; 
            padding: 0.46vh 0.65vw !important; 
            line-height: 1.15 !important; 
            height: auto !important; 
            border-left: none !important; 
            background-color: #3B2155 !important; 
        }
        .layout-viewer3 #excel-table thead th { 
            font-size: 4.2vh !important; 
            padding: 0.46vh 0.65vw !important; 
            line-height: 1.15 !important; 
            height: auto !important; 
            border-left: none !important; 
            background-color: #3B2155 !important;
            text-align: center !important; /* Center the headers */
        }
        
        /* Viewer 1 Column Widths */
        .layout-viewer1 #excel-table th:nth-child(1), .layout-viewer1 #excel-table td:nth-child(1) { width: 15%; }
        .layout-viewer1 #excel-table th:nth-child(2), .layout-viewer1 #excel-table td:nth-child(2) { width: 28.33%; }
        .layout-viewer1 #excel-table th:nth-child(3), .layout-viewer1 #excel-table td:nth-child(3) { width: 28.33%; }
        .layout-viewer1 #excel-table th:nth-child(4), .layout-viewer1 #excel-table td:nth-child(4) { width: 28.33%; }
        
        /* Viewer 2 Column Widths */
        .layout-viewer2 #excel-table th:nth-child(1), .layout-viewer2 #excel-table td:nth-child(1),
        .layout-viewer2 #excel-table th:nth-child(2), .layout-viewer2 #excel-table td:nth-child(2),
        .layout-viewer2 #excel-table th:nth-child(3), .layout-viewer2 #excel-table td:nth-child(3),
        .layout-viewer2 #excel-table th:nth-child(4), .layout-viewer2 #excel-table td:nth-child(4),
        .layout-viewer2 #excel-table th:nth-child(5), .layout-viewer2 #excel-table td:nth-child(5) { 
            width: 20%; 
        }
        
        /* Viewer 3 Column Widths */
        .layout-viewer3 #excel-table th:nth-child(1), .layout-viewer3 #excel-table td:nth-child(1),
        .layout-viewer3 #excel-table th:nth-child(2), .layout-viewer3 #excel-table td:nth-child(2),
        .layout-viewer3 #excel-table th:nth-child(3), .layout-viewer3 #excel-table td:nth-child(3) { 
            width: 33.3%; 
        }
        
                
        #excel-table tr.empty-row { display: none; }
        
        /* Video Elements */
        #transitionVideo {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            object-fit: cover; 
            z-index: 9000; 
            background: #000; 
            visibility: hidden;
            opacity: 0; /* Start invisible for fade effect */
            transition: opacity 0.5s ease-in-out; /* Smooth fade transition */
            /* Force hardware acceleration */
            transform: translateZ(0);
            will-change: transform;
            backface-visibility: hidden;
        }
    </style>
</head>
<body>
    <div class="frame layout-viewer1" id="mainFrame">
        <div class="title-bar">
            <div class="title">KISSING POINT SPORTS CLUB</div>
            <div class="logo-slot" id="logoSlot"><img src="./Media/Button Images/KPSC_Logo.webp" alt="KPSC Logo"></div>
        </div>
        <div id="content">
            <div id="message">Loading Excel files...</div>
            <div id="tableContainer"></div>
            <video id="transitionVideo">
                <source src="./public/Media/Transition_Video/KPSC_Honour_Board_Transition_Video.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>
    <script type="module" src="./src/Honour_Board_Transition_Viewer.js"></script>
</body>
</html>
