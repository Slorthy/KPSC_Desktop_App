<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KPSC Fullscreen Viewer</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; display: flex; 
               justify-content: center; align-items: center; height: 100vh; cursor: none; }
        #viewer { height: 100vh; width: 100vw; object-fit: contain; }
        #status { color: white; font-family: sans-serif; font-size: 20px; }
    </style>
</head>
<body>
    <div id="status">Loading...</div>
    <img id="viewer" src="" style="display:none;">

    <script>
        async function start() {
            const img = document.getElementById('viewer');
            const status = document.getElementById('status');
            const data = await window.api.getFullscreenData();

            if (data && data.images && data.images.length > 0) {
                let photos = data.images;
                let index = data.startIndex || 0;

                const update = () => {
                    // This handles the decoding of the encoded URL from main.js
                    img.src = photos[index];
                    img.style.display = 'block';
                    status.style.display = 'none';
                };

                img.onerror = () => {
                    status.style.display = 'block';
                    status.innerText = "Error displaying photo. Please check folder.";
                };

                update();

                if (photos.length > 1) {
                    setInterval(() => {
                        index = (index + 1) % photos.length;
                        update();
                    }, 10000);
                }

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'F2' || e.key === 'Backspace') window.api.closeWindow();
                });
            } else {
                status.innerText = "No photos found.";
            }
        }
        window.addEventListener('DOMContentLoaded', start);
    </script>
</body>
</html>
